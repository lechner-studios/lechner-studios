name: blog-generate
on:
  schedule:
    - cron: "23 6 * * 1"   # Mon 06:23 UTC
    - cron: "23 6 * * 4"   # Thu 06:23 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Generate a post but skip the PR (verification only)"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - name: Generate post
        id: gen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/blog/generate.mjs ${{ inputs.dry_run && '--dry-run' || '' }}
      - name: Open PR and auto-publish on green
        if: ${{ !inputs.dry_run }}
        # The enterprise forbids the default GITHUB_TOKEN from creating PRs, so
        # authenticate as a user via BLOG_BOT_TOKEN (a fine-grained PAT with
        # Contents + Pull requests: write on this repo). The PAT-opened PR is also
        # what lets the pull_request CI (lint/build/e2e, CodeQL, Vercel) trigger —
        # a GITHUB_TOKEN-opened PR would suppress those runs. If the secret is
        # absent the push still works but the PR/merge can't; Report-failure flags it.
        env:
          GH_TOKEN: ${{ secrets.BLOG_BOT_TOKEN || github.token }}
        run: |
          set -e
          SLUG="${{ steps.gen.outputs.slug }}"
          BRANCH="blog/auto/${SLUG}"
          git config user.name "lechner-studios-bot"
          git config user.email "bot@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add content/blog/"${SLUG}".en.md content/blog/"${SLUG}".de.md
          # --no-verify: the post already passed the stricter scope/honesty lint in
          # generate.mjs; skip the repo's husky pre-commit guard (which can false-positive).
          git commit --no-verify -m "blog: ${{ steps.gen.outputs.keyword }} (${{ steps.gen.outputs.pillar }})"
          git push -u origin "$BRANCH"
          PR_URL=$(gh pr create --base main --head "$BRANCH" \
            --title "blog: ${{ steps.gen.outputs.keyword }} (${{ steps.gen.outputs.pillar }})" \
            --body "Auto-generated post. Pillar: ${{ steps.gen.outputs.pillar }} · keyword: \`${{ steps.gen.outputs.keyword }}\` · slug: \`${SLUG}\`. Auto-publishes once CI is green (the scope/honesty lint + build/e2e are the gate); de/en are on the Vercel preview.")
          echo "Opened ${PR_URL}"
          # Auto-publish on green: the site has no branch protection, so gate here
          # instead. Give the pull_request-triggered checks a moment to register, then
          # block until they all finish. --fail-fast exits non-zero the instant any
          # check fails, so a post that trips the lint/build/e2e never merges — it
          # stays as an open PR and the Report-failure step opens the tracking issue.
          sleep 45
          gh pr checks "${PR_URL}" --watch --fail-fast --interval 20
          gh pr merge "${PR_URL}" --squash --delete-branch

      # Surfaces any failure (missing secret, exhausted topics, lint/build error, PR
      # creation) as a GitHub issue so a broken pipeline is never silent again.
      - name: Report failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TITLE="blog-generate pipeline failed"
          # Reuse one open tracking issue instead of spamming a new one every run.
          EXISTING=$(gh issue list --state open --search "${TITLE} in:title" --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "Failed again — ${RUN_URL}"
          else
            gh issue create --title "$TITLE" --body $'The scheduled blog pipeline failed.\n\nRun log: '"${RUN_URL}"$'\n\nLikely causes: missing `ANTHROPIC_API_KEY` secret, no uncovered topics left in `content/blog/topics.yaml`, or a lint/build failure. Open the failing step in the run log. Close this issue once a run succeeds.'
          fi
