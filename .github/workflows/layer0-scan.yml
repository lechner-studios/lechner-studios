name: Layer-0 scan

# Server-side mirror of .git/hooks/pre-commit.
#
# The hook is the only thing enforcing the Layer-0 identity/currency rules, and
# it is a LOCAL hook: it never runs for commits authored through the GitHub API
# (web editor, `gh api`, MCP push_files, bot commits). Anything landing that way
# has been unscanned. That is not theoretical — src/lib/studio-director/
# knowledge.ts carried unexempted price figures for weeks because of exactly
# this gap.
#
# This job re-runs the same rules against a pull request's whole diff, where
# they cannot be bypassed. Keep the patterns below in sync with the hook.

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: Layer-0 (identity + currency)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan added lines
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # Same pathspec base as the hook: skip lockfiles and binaries.
          pathspecs=(. ':!*.lock' ':!package-lock.json' ':!pnpm-lock.yaml' ':!bun.lockb'
                     ':!*.png' ':!*.jpg' ':!*.jpeg' ':!*.webp' ':!*.avif' ':!*.ico'
                     ':!*.woff' ':!*.woff2' ':!*.pdf')

          # Honour .layer0-allow, and fail if it has gone stale: an entry for a
          # path that no longer exists silently pre-exempts anything later
          # created there, which inverts the guard.
          dangling=0
          if [ -f .layer0-allow ]; then
            while IFS= read -r line || [ -n "$line" ]; do
              # Strip CR: the file is CRLF in a Windows checkout, and a trailing
              # \r makes every path test fail and every blank line look real.
              line="${line%$'\r'}"
              case "$line" in ''|'#'*) continue ;; esac
              pathspecs+=(":!$line")
              if [ ! -e "$line" ]; then
                echo "::error file=.layer0-allow::dangling exemption, path does not exist: $line"
                dangling=1
              fi
            done < .layer0-allow
          fi
          [ "$dangling" -eq 0 ] || exit 1

          base="${BASE:-$(git rev-parse HEAD~1)}"
          diff="$(git diff "$base" "${HEAD:-HEAD}" --unified=0 -- "${pathspecs[@]}")"
          added="$(printf '%s\n' "$diff" | grep -E '^\+' | grep -Ev '^\+\+\+' || true)"

          fail() { echo "::error::Layer-0: $1"; printf '%s\n' "$2"; exit 1; }

          if m=$(printf '%s\n' "$added" | grep -En '[[:alnum:]._%+-]+@[[:alnum:].-]+\.[[:alpha:]]{2,}' || true); [ -n "$m" ]; then
            fail 'email-like token found' "$m"
          fi
          if m=$(printf '%s\n' "$added" | grep -En '[€£¥]|\$[0-9]' || true); [ -n "$m" ]; then
            fail 'currency symbol found — use units' "$m"
          fi
          if m=$(printf '%s\n' "$added" | grep -Enw 'USD|EUR|GBP|CHF|JPY|AUD|CAD' || true); [ -n "$m" ]; then
            fail 'currency code found — use units' "$m"
          fi

          # Phone-like digit runs, with the hook's pre-filter for SVG path data,
          # hashes and ISO dates.
          phone_input="$(printf '%s\n' "$added" \
            | grep -Ev '(d=\"|viewBox|stroke-|fill=|[0-9a-f]{16,})' \
            | grep -Ev '[0-9]{4}-[0-9]{2}-[0-9]{2}' || true)"
          if m=$(printf '%s\n' "$phone_input" | grep -En '(^|[^0-9a-f-])(\+[0-9 ()\-]{8,}[0-9]|\([0-9]{2,5}\)[ \-]?[0-9][0-9 \-]{5,}[0-9]|[0-9]{7,})($|[^0-9a-f-])' || true); [ -n "$m" ]; then
            fail 'phone-like digit run found' "$m"
          fi

          echo "Layer-0 scan clean."
