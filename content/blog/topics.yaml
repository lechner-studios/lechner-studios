# Seed keyword universe for auto-generated blog posts. Owner-steerable:
# add entries to keep the generator fed; each becomes one bilingual post.
# pillar keys map to the service pages: webdesign / apps-automation / seo / brand.
# slug = the canonical URL slug (kebab-case, unique); keyword = primary SEO target.
# offer = OPTIONAL. Which productized offer the post's CTA points at.
#   Valid keys live in src/lib/offers.mjs: website-check | direktbucher.
#   Omit it and the post falls back to website-check, the entry offer, which
#   suits nearly every topic. Set direktbucher on pension/tourism topics.
# imageQuery = OPTIONAL. A per-topic Pexels search override (see
#   scripts/blog/images.mjs). Omit it and the post's category theme
#   (CATEGORY_IMAGE_QUERIES) is used instead — the default for every topic
#   below.
# graphic = OPTIONAL. Which crafted technical graphic renders as the post's
#   hero/tile (see src/lib/post-graphics.mjs). Valid keys: dom-diff | node-flow
#   | load-waterfall | type-system. Omit it and the post's category default
#   (CATEGORY_GRAPHIC) is used instead. A graphic always outranks a photo, so
#   the Pexels fetch below only ever shows for a post with no graphic.
#   Set `graphic: none` to opt a topic out of graphics entirely. That is the
#   only way to reach the photo path, for a post where atmosphere (a real
#   developer workspace) serves better than a diagram. With neither a graphic
#   nor a photo, the post falls back to a plain tinted band.
# widget = OPTIONAL. Which interactive calculator renders after the post body,
#   before the offer CTA (see src/lib/post-widgets.mjs). Valid keys:
#   portal-commission. There is no category default — omit it and no widget
#   renders. A typo is caught by lint.mjs, same as offer/graphic.
